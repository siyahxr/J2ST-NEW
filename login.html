<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>j2st.lol | Login</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body>
    <div class="animated-bg"><div class="blob"></div><div class="blob-2"></div></div>
    <div class="grid-overlay"></div>
    <div class="auth-container">
        <div class="auth-brand">
            <img src="assest/j2st.logo.png" alt="j2st" class="auth-logo">
        </div>
        <form class="auth-form glass-card" id="form-login" onsubmit="handleLogin(event)">
            <h2 class="form-title">Welcome back</h2>
            <p class="form-sub">Sign in to your j2st.lol account</p>
            <div class="field-group">
                <label class="field-label">Username</label>
                <input id="login-email" class="field-input" type="text" placeholder="Enter username or email" required autocomplete="username">
            </div>
            <div class="field-group">
                <label class="field-label">Password</label>
                <div class="field-pw-wrap">
                    <input id="login-pass" class="field-input" type="password" placeholder="Enter your password" required autocomplete="current-password">
                    <button type="button" class="pw-toggle" onclick="togglePw('login-pass',this)">👁</button>
                </div>
            </div>
            
            <!-- Turnstile Widget -->
            <div style="display: flex; justify-content: center; margin-bottom: 20px;">
                <div class="cf-turnstile" data-sitekey="0x4AAAAAAA_jF_a9t0e7NqWj" data-theme="dark"></div>
            </div>

            <div id="login-error" class="form-error"></div>
            <button type="submit" class="auth-submit" id="btn-login">Sign In →</button>

            <p class="form-hint">No account? <a href="register.html">Create one</a></p>
        </form>
        <p class="auth-back"><a href="index.html">← Back to home</a></p>
    </div>
    <script src="system/i18n.js"></script>
    <script src="auth.js"></script>
</body>
</html>
