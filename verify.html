<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>j2st.lol | E-posta Doğrulama</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background-color: #050505; color: #fff;
            font-family: 'Outfit', sans-serif;
            background-image: radial-gradient(circle at center, rgba(30, 30, 30, 0.5) 0%, #050505 100%);
        }
        .verify-box {
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px; border-radius: 20px;
            text-align: center; max-width: 400px; width: 90%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        h1 { font-size: 28px; font-weight: 800; margin-top: 0; letter-spacing: -1px; }
        p { color: #aaa; font-size: 15px; margin-bottom: 30px; line-height: 1.5; }
        .spinner {
            width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid #fff; border-radius: 50%;
            animation: spin 1s linear infinite; margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .btn {
            background: #fff; color: #000; padding: 12px 24px;
            border-radius: 12px; font-weight: 700; text-decoration: none;
            display: inline-block; transition: 0.3s; cursor: pointer; border: none; font-size: 15px;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,255,255,0.3); }

        #error-msg { color: #ef4444; font-size: 14px; margin-top: 15px; font-weight: 600; display: none; }
        #success-msg { color: #22c55e; font-size: 14px; margin-top: 15px; font-weight: 600; display: none; }
    </style>
</head>
<body>

    <div class="verify-box">
        <div id="loading" class="spinner"></div>
        <h1 id="title">Doğrulanıyor...</h1>
        <p id="desc">Lütfen bekleyin, e-posta adresiniz onaylanıyor.</p>

        <a href="login.html" class="btn" id="login-btn" style="display: none;">Giriş Yap</a>
        <div id="error-msg">Geçersiz token.</div>
        <div id="success-msg">Onaylandı!</div>
    </div>

    <script>
        window.onload = async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');

            if (!token) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('title').innerText = "Hata!";
                document.getElementById('desc').innerText = "Doğrulama linki geçersiz veya eksik.";
                document.getElementById('error-msg').style.display = 'block';
                return;
            }

            try {
                const res = await fetch('/api/auth/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token })
                });

                const data = await res.json();
                document.getElementById('loading').style.display = 'none';

                if (res.ok) {
                    document.getElementById('title').innerText = "Onaylandı!";
                    document.getElementById('desc').innerText = "Elit kimliğin başarıyla doğrulandı. Artık hesabına giriş yapabilir ve profilini düzenleyebilirsin.";
                    document.getElementById('success-msg').style.display = 'block';
                    document.getElementById('login-btn').style.display = 'inline-block';
                } else {
                    document.getElementById('title').innerText = "Doğrulanamadı";
                    document.getElementById('desc').innerText = data.error || "Bilinmeyen bir hata oluştu.";
                    document.getElementById('error-msg').style.display = 'block';
                    document.getElementById('error-msg').innerText = data.error;
                }
            } catch (err) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('title').innerText = "Bağlantı Hatası";
                document.getElementById('desc').innerText = "Sunucuya ulaşılamıyor. Lütfen daha sonra tekrar deneyin.";
                document.getElementById('error-msg').style.display = 'block';
            }
        };
    </script>
</body>
</html>
