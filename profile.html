<html lang="tr">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>j2st.lol | Profile</title>
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --accent-primary: #fff;
            --glass-bg: rgba(10, 10, 10, 0.4);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #fff;
            --text-dim: rgba(255, 255, 255, 0.6);
        }

        body {
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; margin: 0; padding: 20px; background-color: #000;
            background-size: cover; background-position: center; background-attachment: fixed; transition: 0.5s;
            overflow-x: hidden; font-family: 'Outfit', sans-serif;
        }

        .page-overlay { position: fixed; inset: 0; background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.4) 100%); z-index: -1; pointer-events: none; }

        /* FULLSCREEN BACKGROUND MEDIA */
        #bg-media-wrap {
            position: fixed; inset: 0; z-index: -2; overflow: hidden; background: #000;
        }
        .full-bg-media {
            width: 100vw; height: 100vh; object-fit: cover; 
            opacity: 0.6; filter: brightness(0.7);
        }

        /* UI STRUCTURE */
        .profile-container { 
            width: 95%; max-width: 850px; display: flex; flex-direction: column; gap: 20px; 
            align-items: center; z-index: 10; padding: 40px 0;
        }

        .profile-card {
            width: 100%; display: flex; flex-direction: column; overflow: visible;
            background: rgba(10, 10, 10, 0.4);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px; position: relative; 
            transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            color: var(--text-main);
            opacity: 1; 
            animation: card-appear 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        .card-main-content { padding: 40px; display: flex; gap: 50px; position: relative; align-items: flex-start; }
        .left-side { display: flex; flex-direction: column; align-items: center; width: 160px; flex-shrink: 0; }
        .right-side { flex: 1; display: flex; flex-direction: column; padding-top: 30px; text-align: left; }

        .profile-avatar { 
            width: 160px; height: 160px; border-radius: 40px; 
            border: 6px solid #000; object-fit: cover; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.5); 
            transition: 0.4s; background: #000;
        }

        .name-row { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
        .profile-name { font-size: 42px; font-weight: 900; letter-spacing: -1.5px; margin: 0; color: #fff; line-height: 1; }
        .profile-handle { font-size: 18px; font-weight: 600; color: rgba(255,255,255,0.4); margin-top: 5px; opacity: 0.8; }
        .name-id-stack { display: flex; flex-direction: column; align-items: flex-start; }
        
        .badge-container { 
            display: flex; gap: 16px; align-items: center; min-height: 44px; padding: 6px 20px; 
            background: rgba(0,0,0,0.65); border: 1.2px solid rgba(255,255,255,0.1); 
            border-radius: 999px; width: fit-content; 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.6), inset 0 0 15px rgba(255,255,255,0.03);
            position: relative; margin-top: 5px;
        }
        .badge-item { 
            cursor: help; transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1); 
            position: relative; display: flex; align-items: center; justify-content: center;
            width: 28px; height: 28px;
        }
        .badge-item i { 
            font-size: 24px; 
            text-shadow: 0 0 3px currentColor, 0 0 10px currentColor;
            filter: drop-shadow(0 0 8px currentColor);
            transition: 0.4s; position: relative;
        }

        /* Shine Sweep Effect on the icon itself */
        .badge-item::before {
            content: ""; position: absolute; inset: -4px;
            background: linear-gradient(120deg, transparent 40%, rgba(255,255,255,0.3) 50%, transparent 60%);
            background-size: 200% 100%;
            animation: icon-sweep 3s infinite linear;
            pointer-events: none; z-index: 5; mask-image: radial-gradient(circle, #fff, transparent); -webkit-mask-image: radial-gradient(circle, #fff, transparent);
        }
        @keyframes icon-sweep { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        .badge-item img { 
            height: 24px; width: 24px; object-fit: contain; 
            filter: brightness(1.1) drop-shadow(0 0 5px currentColor);
        }
        
        .badge-item:hover { transform: scale(1.4) translateY(-8px); filter: brightness(1.2); }
        .badge-item:hover i { text-shadow: 0 0 15px currentColor, 0 0 30px currentColor; filter: drop-shadow(0 0 20px currentColor); }
        .badge-item:hover img { filter: brightness(1.3) drop-shadow(0 0 15px currentColor); }
        .badge-item:hover::before { animation-duration: 0.8s; opacity: 1; }

        /* Tooltip */
        .badge-item::after { 
            content: attr(data-title);
            position: absolute; bottom: -35px; left: 50%;
            transform: translateX(-50%) translateY(10px);
            background: rgba(0,0,0,0.9); color: #fff;
            padding: 6px 12px; border-radius: 8px; font-size: 13px; font-weight: 600;
            white-space: nowrap; opacity: 0; pointer-events: none; transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            z-index: 100;
        }
        .badge-item:hover::after { opacity: 1; transform: translateX(-50%) translateY(0); }

        .profile-bio { color: var(--text-dim); font-size: 16px; line-height: 1.6; margin: 0 0 25px 0; font-weight: 400; max-width: 100%; }

        .nexus-wrapper { 
            width: 100%; display: flex; align-items: center; justify-content: flex-start; gap: 24px; margin-top: 5px;
        }
        .social-link-btn { 
            display: flex; align-items: center; justify-content: center;
            text-decoration: none; color: #fff; transition: all 0.3s ease;
        }
        .social-link-btn:hover { transform: scale(1.25); filter: drop-shadow(0 0 10px rgba(255,255,255,0.6)); }
        .social-link-btn i { font-size: 26px; color: #fff; opacity: 0.8; }
        .social-link-btn:hover i { opacity: 1; }
        .social-link-btn span { display: none; }

        .presence-stack { width: 100%; margin: 0; display: flex; flex-direction: column; gap: 15px; }
        .presence-card {
            background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px; padding: 12px; display: flex; align-items: center; gap: 12px;
            width: 100%; transition: 0.3s;
        }

        .stats-footer { 
            display: flex; gap: 20px; padding: 20px 40px; border-top: 1px solid rgba(255,255,255,0.05);
            background: rgba(0,0,0,0.1); width: 100%; justify-content: space-between; align-items: center;
        }
        .stat-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: rgba(255,255,255,0.3); font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

        @keyframes card-appear {
            0% { opacity: 0; transform: translateY(40px) scale(0.98); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes f-wing-l { 0%,100% { transform: rotate(-8deg); } 50% { transform: rotate(-25deg) scale(1.15); filter: brightness(1.4); } }
        @keyframes f-wing-r { 0%,100% { transform: scaleX(-1) rotate(-8deg); } 50% { transform: scaleX(-1) rotate(-25deg) scale(1.15); filter: brightness(1.4); } }
        .fx-wings-l, .fx-wings-r { position: absolute; width: 160px; height: 120px; top: -10px; pointer-events: none; opacity: 0.8; z-index: -1; transition: 0.5s; }
        .fx-wings-l { left: -90px; animation: f-wing-l 2.5s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
        .fx-wings-r { right: -90px; animation: f-wing-r 2.5s cubic-bezier(0.4, 0, 0.2, 1) infinite; }

        .fx-aura { position: absolute; inset: -20px; border-radius: 50%; border: 2px solid currentColor; box-shadow: 0 0 40px currentColor, inset 0 0 20px currentColor; opacity: 0; animation: f-aura-expand 2s infinite; }
        @keyframes f-aura-expand { 0% { transform: scale(0.85); opacity: 0.6; } 100% { transform: scale(1.3); opacity: 0; } }
        
        .fx-halo { position: absolute; top: -45px; left: 50%; transform: translateX(-50%); width: 100px; height: 18px; border-radius: 50%; border: 4px solid currentColor; filter: drop-shadow(0 0 15px currentColor); animation: f-halo-float 3s ease-in-out infinite; }
        .fx-halo::before { content: ""; position: absolute; width: 8px; height: 8px; background: #fff; border-radius: 50%; box-shadow: 0 0 15px #fff; animation: f-halo-orbit 2s linear infinite; }
        @keyframes f-halo-float { 0%,100% { transform: translateX(-50%) translateY(0) rotate(2deg); } 50% { transform: translateX(-50%) translateY(-12px) rotate(-2deg); } }
        @keyframes f-halo-orbit { from { left: 0%; top: 50%; } to { left: 100%; top: 50%; } }
        
        .fx-vortex { position: absolute; inset: -60px; border-radius: 50%; background: conic-gradient(from 0deg, transparent, currentColor, #fff, currentColor, transparent); animation: f-spin 1.2s linear infinite; mask: radial-gradient(transparent 55%, black 75%); -webkit-mask: radial-gradient(transparent 55%, black 75%); filter: contrast(1.5); }

        @keyframes f-pulse-pro { 0%,100% { transform: scale(1); filter: brightness(1); } 20% { transform: scale(1.08); filter: brightness(1.3); } 40% { transform: scale(1.02); } 60% { transform: scale(1.1); } }
        @keyframes f-spin { to { transform: rotate(360deg); } }

        /* NAME EFFECTS */
        .effect-rainbow { background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8f00ff, #ff0000); -webkit-background-clip: text; background-clip: text; color: transparent !important; background-size: 300%; animation: f-rainbow 4s linear infinite; filter: drop-shadow(0 0 8px rgba(255,255,255,0.3)); }
        
        .effect-glow { animation: f-glow-ultra 2.5s ease-in-out infinite; }
        @keyframes f-glow-ultra { 0%,100% { text-shadow: 0 0 10px currentColor; filter: brightness(1); } 50% { text-shadow: 0 0 30px currentColor, 0 0 60px currentColor; filter: brightness(1.5) scale(1.02); } }

        .effect-glitch { animation: f-glitch-pro 0.3s infinite; position: relative; }
        @keyframes f-glitch-pro { 
            0% { transform: translate(0) skew(0); text-shadow: 3px 0 #ff00ff, -3px 0 #00ffff; }
            25% { transform: translate(-3px, 2px) skew(2deg); }
            50% { transform: translate(3px, -1px) skew(-1deg); text-shadow: -3px 0 #ff00ff, 3px 0 #00ffff; }
            75% { transform: translate(-1px, 3px) skew(1deg); }
        }

        .effect-float { animation: f-float-pro 4s cubic-bezier(0.45, 0, 0.55, 1) infinite; }
        @keyframes f-float-pro { 0%,100% { transform: translateY(0) rotate(0); } 50% { transform: translateY(-15px) rotate(1deg); } }

        .effect-shiny { position: relative; overflow: hidden; background: linear-gradient(110deg, currentColor 45%, #fff 50%, currentColor 55%); -webkit-background-clip: text; background-clip: text; color: transparent !important; background-size: 200% 100%; animation: f-sweep 3s ease-in-out infinite; }
        @keyframes f-sweep { from { background-position: 200% 0; } to { background-position: -200% 0; } }

        .effect-neon { animation: f-neon-pro 2s infinite; text-shadow: 0 0 15px currentColor; }
        @keyframes f-neon-pro { 0%, 18%, 22%, 25%, 53%, 57%, 100% { opacity: 1; filter: brightness(1.2) drop-shadow(0 0 20px currentColor); } 20%, 24%, 55% { opacity: 0.6; filter: brightness(0.8); text-shadow: none; } }

        .effect-vanish { animation: f-vanish 5s ease-in-out infinite; }
        
        .effect-icy { color: #fff !important; text-shadow: 0 0 10px #70dbff, 0 0 25px #00aaff, 0 0 45px rgba(0, 170, 255, 0.5); animation: f-ice-jitter 3s infinite; }
        @keyframes f-ice-jitter { 0%,100% { transform: scale(1); } 50% { transform: scale(1.01); filter: hue-rotate(10deg); } }

        .effect-burning { color: #ffeb3b !important; text-shadow: 0 0 8px #ff4500, 0 -10px 20px #ff0000; animation: f-hellfire 0.2s infinite alternate; }
        @keyframes f-hellfire { from { text-shadow: 0 0 8px #ff4500, 0 -10px 20px #ff0000; } to { text-shadow: 0 0 12px #ff6a00, 0 -15px 30px #ff4000; transform: skewX(1deg); } }

        .effect-gold { background: linear-gradient(135deg, #d4af37 0%, #fff 40%, #d4af37 50%, #8a6d3b 100%); -webkit-background-clip: text; background-clip: text; color: transparent !important; background-size: 200%; animation: f-rainbow 6s linear infinite; filter: drop-shadow(0 0 12px rgba(212, 175, 55, 0.4)); }

        .avatar-glow { filter: drop-shadow(0 0 30px currentColor); }
        .avatar-spin { animation: f-spin 6s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
        .avatar-pulse { animation: f-pulse-pro 2s ease-in-out infinite; }

        .fx-matrix { position: absolute; inset: 0; background: repeating-linear-gradient(0deg, transparent 0%, currentColor 50%, transparent 100%); background-size: 100% 30px; animation: f-matrix-pro 1.5s linear infinite; opacity: 0.4; pointer-events: none; }
        @keyframes f-matrix-pro { from { background-position: 0 0; } to { background-position: 0 600px; } }

        .fx-snow { position: absolute; inset: -20px; background: radial-gradient(circle, #fff 10%, transparent 20%); background-size: 25px 25px; animation: f-snow-pro 4s linear infinite; opacity: 0.6; }
        @keyframes f-snow-pro { from { transform: translateY(-50px) rotate(0); } to { transform: translateY(150px) rotate(360deg); } }

        .fx-hearts { position: absolute; inset: -30px; }
        .fx-hearts::before { content: "✨"; position: absolute; font-size: 16px; animation: f-rise-pro 3s infinite; left: 15%; color: #ff0; }
        .fx-hearts::after { content: "♥"; position: absolute; font-size: 20px; animation: f-rise-pro 2.5s infinite; left: 75%; animation-delay: 0.8s; color: #ff0055; filter: drop-shadow(0 0 8px #ff0055); }
        @keyframes f-rise-pro { 0% { transform: translateY(50px) scale(0); opacity: 0; } 50% { opacity: 1; transform: translateY(-20px) scale(1.2) rotate(10deg); } 100% { transform: translateY(-100px) scale(0.5); opacity: 0; } }
    </style>
</head>

o,number-square-zero,number-three,number-two,number-zero,nut,ny-times-logo,octagon,office-chair,option,orange-slice,oven,package,paint-brush,paint-brush-broad,paint-bucket,paint-roller,palette,pants,paper-plane,paper-plane-right,paper-plane-tilt,paperclip,paperclip-horizontal,parachute,paragraph,parallelogram,park,password,path,patreon-logo,pause,pause-circle,paw-print,peace,pen,pen-nib,pen-nib-straight,pencil,pencil-circle,pencil-line,pencil-simple".split(",");

        const badgePrefixes = ['Void', 'Ether', 'Abyss', 'Nova', 'Aura', 'Soul', 'Frost', 'Zenith', 'Phantom', 'Storm', 'Light', 'Shadow', 'Neon', 'Eclipse', 'Prime', 'Titan', 'Star', 'Crest', 'Essence', 'Mythos'];
        const badgeCores = ['Walker', 'Guardian', 'Oracle', 'Seeker', 'Lord', 'Phantom', 'Knight', 'Slayer', 'Ghost', 'Wraith', 'Spirit', 'Entity', 'Dragon', 'Master', 'Hunter', 'Protector', 'Warden', 'Saint'];

        for (let i = 1; i <= 294; i++) {
            let iconStr = pIconsFull[i] || 'star';
            badgeRegistry.push({ name: `${badgePrefixes[i % 20]} ${badgeCores[i % 18]} #${i}`, icon: `ph-fill ph-${iconStr}` });
        }

        const socialModels = {
            Instagram: { icon: 'ph-fill ph-instagram-logo', url: 'https://instagram.com/' },
            TikTok: { icon: 'ph-fill ph-tiktok-logo', url: 'https://tiktok.com/@' },
            Twitter: { icon: 'ph-fill ph-twitter-logo', url: 'https://twitter.com/' },
            X: { icon: 'ph-fill ph-twitter-logo', url: 'https://x.com/' },
            YouTube: { icon: 'ph-fill ph-youtube-logo', url: 'https://youtube.com/@' },
            Twitch: { icon: 'ph-fill ph-twitch-logo', url: 'https://twitch.tv/' },
            Discord: { icon: 'ph-fill ph-discord-logo', url: 'https://discord.com/users/' },
            Github: { icon: 'ph-fill ph-github-logo', url: 'https://github.com/' },
            Steam: { icon: 'ph-fill ph-steam-logo', url: 'https://steamcommunity.com/id/' },
            Spotify: { icon: 'ph-fill ph-spotify-logo', url: 'https://open.spotify.com/user/' },
            Roblox: { icon: 'ph-fill ph-game-controller', url: 'https://www.roblox.com/users/' },
            Telegram: { icon: 'ph-fill ph-telegram-logo', url: 'https://t.me/' }
        };

        window.addEventListener('load', async () => {
            const url = new URL(window.location.href);
            const u = url.searchParams.get('u');
            if (u && window.location.pathname.endsWith('profile.html')) {
                window.location.href = `/${encodeURIComponent(u)}`;
                return;
            }
            
            let data = {};
            
            // DİNAMİK PROFİL MOTORU: Eğer URL'de bir isim varsa (örn: localhost:5500/$) sunucudan çek.
            const urlPath = window.location.pathname;
            const isDynamicProfile = urlPath !== '/' && !urlPath.endsWith('.html');
            
            if (isDynamicProfile) {
                const username = urlPath.substring(1); // Başındaki / işaretini atar ('$')
                try {
                    const res = await fetch('/api/user/' + username);
                    const apiData = await res.json();
                    if (apiData.success && apiData.profile) {
                        data = apiData.profile;
                    } else {
                        data = JSON.parse(localStorage.getItem('j2st_settings')) || {};
                    }
                } catch(e) {
                    console.error("Geçersiz API isteği:", e);
                    data = JSON.parse(localStorage.getItem('j2st_settings')) || {};
                }
            } else {
                // Sadece profile.html'e normal tıklanırsa (Önizleme maksatlı)
                data = JSON.parse(localStorage.getItem('j2st_settings')) || JSON.parse(localStorage.getItem('profileData')) || {};
            }

            const card = document.getElementById('main-card');
            const fx = document.getElementById('p-avatar-fx');

            if (data.is_suspended || data.suspended) {
                document.body.innerHTML = `
                <div style="background:#000; color:#fff; height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; font-family:'Outfit',sans-serif;">
                    <div style="background:rgba(255,0,0,0.9); color:#fff; padding:20px 50px; font-weight:900; font-size:40px; border-radius:12px; transform:rotate(-5deg); border: 4px solid #fff; box-shadow: 0 0 100px rgba(255,0,0,0.4); text-align:center;">
                        J2ST / SUSPENDED
                        <div style="font-size:12px; margin-top:10px; opacity:0.8; font-weight:600;">ACCESS REVOKED BY GOVERNANCE</div>
                    </div>
                    <button onclick="window.location.href='/'" style="margin-top:40px; background:none; border:1px solid rgba(255,255,255,0.2); color:#fff; padding:10px 20px; border-radius:8px; cursor:pointer; font-size:12px; font-weight:700;">RETURN TO THE J2ST</button>
                </div>`;
                return;
            }

            document.getElementById('p-name').innerText = data.displayName || data.name || "User";
            document.getElementById('p-handle').innerText = `@${data.username || '$'}`;
            document.getElementById('p-bio').innerHTML = (data.bio || "Hello!").replace(/\n/g, '<br>');
            document.getElementById('p-avatar').src = data.avatar || "j2st.webp";
            document.getElementById('p-views').innerText = `${(data.views || 0).toLocaleString()} views`;
            document.getElementById('p-joined').innerHTML = `<span style="color:var(--accent-primary); opacity:1;">J2ST . LOL</span> ( ELİTE DIGITAL COLLECTIVE )`;

            // Accent Color
            if (data.accent) {
                document.documentElement.style.setProperty('--accent-primary', data.accent);
                document.getElementById('p-name').style.color = data.accent;
                document.getElementById('p-name').style.textShadow = `0 0 ${data.glow || 10}px ${data.accent}`;
            }

            // Avatar FX
            fx.innerHTML = "";
            const eff = data.avatarEffect;
            const effCol = data.avatarEffectColor || data.accent || '#fff';
            if (eff === 'wings') {
                fx.innerHTML = `<img src="assest/templates/wings.png" class="wing-effect wing-left" style="color:${effCol}"><img src="assest/templates/wings.png" class="wing-effect wing-right" style="color:${effCol}">`;
            } else if (eff === 'aura') {
                fx.innerHTML = `<div class="aura-effect" style="color:${effCol}"></div>`;
            }

            // Nexus (Socials)
            const nexus = document.getElementById('p-nexus');
            nexus.innerHTML = "";
            (data.links || data.socials || []).forEach(s => {
                const platformKey = s.platform || s.name || '';
                // Case-insensitive lookup
                const platformName = Object.keys(socialModels).find(k => k.toLowerCase() === platformKey.toLowerCase()) || platformKey;
                const model = socialModels[platformName] || { icon: 'ph-link', url: '' };
                const btn = document.createElement('a');
                btn.className = 'social-link-btn';
                
                let finalUrl = s.url || "#";
                if ((!s.url || s.url === "#") && s.username && model.url) {
                    finalUrl = model.url + s.username;
                }
                
                btn.href = finalUrl;
                btn.target = "_blank";
                btn.innerHTML = `<i class="${model.icon}"></i><span>${platformName}</span>`;
                nexus.appendChild(btn);
            });

            // Badges
            const bCont = document.getElementById('p-badges-wrap');
            bCont.innerHTML = "";
            (data.badges || []).forEach(bn => {
                const b = badgeRegistry.find(r => r.name === bn) || { icon: 'ph-fill ph-star', color: '#ffffff' };
                const div = document.createElement('div');
                div.className = 'badge-item';
                div.setAttribute('data-title', bn);
                const h = (data.badgeSize || 28) + 'px'; // Increased default from 24 to 28
                
                if(b.svg) {
                    div.innerHTML = b.svg.replace('width="24" height="24"', `width="${h}" height="${h}"`);
                    div.style.filter = `drop-shadow(0 0 10px ${b.color})`;
                } else if(b.customIcon) {
                    div.innerHTML = `<img src="${b.customIcon}" style="height:${h};">`;
                    div.style.filter = `drop-shadow(0 0 10px ${b.color || '#fff'})`;
                } else {
                    div.style.color = b.color || '#fff';
                    div.style.textShadow = `0 0 10px ${b.color || '#fff'}`;
                    div.innerHTML = `<i class="${b.icon}" style="font-size:${h}; color:inherit;"></i>`;
                }
                
                bCont.appendChild(div);
            });

            // Discord & Presence
            if (data.discordId) {
                const presenceMount = document.getElementById('presence-discord-mount');
                const muCard = document.getElementById('presence-music');
                let socket;
                let heartbeatInterval;

                const connectSocket = () => {
                    socket = new WebSocket('wss://api.lanyard.rest/socket');
                    socket.onopen = () => socket.send(JSON.stringify({ op: 2, d: { subscribe_to_id: data.discordId } }));
                    socket.onmessage = (msg) => {
                        const { op, d, t } = JSON.parse(msg.data);
                        if (op === 1) heartbeatInterval = setInterval(() => socket.send(JSON.stringify({ op: 3 })), d.heartbeat_interval);
                        if (t === 'INIT_STATE' || t === 'PRESENCE_UPDATE') updateUI(d);
                    };
                    socket.onclose = () => { clearInterval(heartbeatInterval); setTimeout(connectSocket, 5000); };
                };

                const updateUI = (d) => {
                    const user = d.discord_user;
                    const bannerUrl = user.banner ? `https://cdn.discordapp.com/banners/${user.id}/${user.banner}.png?size=600` : null;
                    presenceMount.innerHTML = `
                        <div class="presence-card" style="padding:0; overflow:hidden; background-image: ${bannerUrl ? `linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), url(${bannerUrl})` : 'none'}; background-size: cover;">
                            <div style="padding: 15px 20px; display: flex; align-items: center; gap: 15px; width: 100%;">
                                <div style="position: relative;">
                                    <img src="${user.avatar ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png` : `https://cdn.discordapp.com/embed/avatars/0.png`}" style="width: 50px; height: 50px; border-radius: 50%; border: 2px solid #000;">
                                    <div style="position: absolute; bottom: 0; right: 0; width: 14px; height: 14px; border-radius: 50%; border: 2px solid #000; background: ${{ online: '#43b581', dnd: '#f04747', idle: '#faa61a' }[d.discord_status] || '#747f8d'};"></div>
                                </div>
                                <div style="flex: 1;">
                                    <div style="font-weight: 700; font-size: 16px;">${user.global_name || user.username}</div>
                                    <div style="font-size: 12px; opacity: 0.7;">${d.activities.find(a => a.type === 4)?.state || d.discord_status.toUpperCase()}</div>
                                </div>
                                <i class="ph-fill ph-discord-logo" style="font-size: 24px; opacity: 0.5;"></i>
                            </div>
                        </div>
                    `;

                    if (d.listening_to_spotify) {
                        const sp = d.spotify;
                        muCard.style.display = 'flex';
                        document.getElementById('mu-song').innerText = sp.song;
                        document.getElementById('mu-artist').innerText = sp.artist;
                        document.getElementById('mu-cover').src = sp.album_art_url;
                    } else { muCard.style.display = 'none'; }
                };
                connectSocket();
            }

            // FULLSCREEN BANNER SYNC (Image & Video)
            const bgContainer = document.getElementById('bg-media-wrap');
            const source = data.banner || data.bannerSource;
            if (source) {
                const isVideo = source.includes('video') || source.endsWith('.mp4') || data.bannerIsVideo;
                if (isVideo) {
                    const vid = document.createElement('video');
                    vid.className = 'full-bg-media';
                    vid.src = source; vid.autoplay = true; vid.loop = true; vid.muted = true; vid.playsInline = true;
                    bgContainer.appendChild(vid);
                } else {
                    const img = new Image(); img.className = 'full-bg-media'; img.src = source;
                    bgContainer.appendChild(img);
                }
            }

            // Final Aesthetics
            const cardCol = data.cardColor || '#0a0a0a';
            const r = parseInt(cardCol.slice(1, 3), 16) || 10;
            const g = parseInt(cardCol.slice(3, 5), 16) || 10;
            const b = parseInt(cardCol.slice(5, 7), 16) || 10;
            card.style.background = `rgba(${r},${g},${b}, ${(data.opacity || 70) / 100})`;
            if (data.cardBlur !== undefined) card.style.backdropFilter = `blur(${data.cardBlur}px) saturate(180%)`;
            if (data.cardBlur !== undefined) card.style.webkitBackdropFilter = `blur(${data.cardBlur}px) saturate(180%)`;

            // Effects Dispatcher
            const pName = document.getElementById('p-name');
            const pAvatarFx = document.getElementById('p-avatar-fx');
            const avWrap = document.querySelector('.profile-avatar').parentElement;
            const accent = data.accent || '#ffffff';
            const fxCol = data.avatarEffectColor || accent;

            if(data.nameEffect) pName.classList.add(`effect-${data.nameEffect}`);
            pName.style.color = accent;

            if(data.avatarEffect === 'wings') {
                pAvatarFx.innerHTML = `<div class="fx-wings-l" style="color:${fxCol}"></div><div class="fx-wings-r" style="color:${fxCol}"></div>`;
            } else if(data.avatarEffect === 'aura') {
                pAvatarFx.innerHTML = `<div class="fx-aura" style="color:${fxCol}"></div>`;
            } else if(data.avatarEffect === 'halo') {
                pAvatarFx.innerHTML = `<div class="fx-halo" style="color:${fxCol}"></div>`;
            } else if(data.avatarEffect === 'vortex') {
                pAvatarFx.innerHTML = `<div class="fx-vortex" style="color:${fxCol}"></div>`;
            } else if(data.avatarEffect === 'spin') {
                avWrap.classList.add('avatar-spin');
            } else if(data.avatarEffect === 'pulse') {
                avWrap.classList.add('avatar-pulse');
            } else if(data.avatarEffect === 'fire') {
                pAvatarFx.innerHTML = `<div class="fx-aura" style="color:#ff5500; box-shadow: 0 -20px 40px #ffcc00;"></div>`;
            } else if(data.avatarEffect === 'lightning') {
                pAvatarFx.innerHTML = `<div class="fx-aura" style="color:#00ffff; transition: 0.1s; animation: f-flicker 0.2s infinite;"></div>`;
            } else if(data.avatarEffect === 'matrix') {
                pAvatarFx.innerHTML = `<div class="fx-matrix" style="color:${fxCol}"></div>`;
            } else if(data.avatarEffect === 'snow') {
                pAvatarFx.innerHTML = `<div class="fx-snow"></div>`;
            } else if(data.avatarEffect === 'hearts') {
                pAvatarFx.innerHTML = `<div class="fx-hearts"></div>`;
            } else if(data.avatarEffect === 'glitch') {
                avWrap.classList.add('effect-glitch');
            } else if(data.avatarEffect === 'particles') {
                pAvatarFx.innerHTML = `<div class="fx-aura" style="color:${fxCol}; filter: blur(10px); opacity: 0.3;"></div><div class="fx-halo" style="color:${fxCol}; width: 120px; border-width: 1px;"></div>`;
            } else if(data.avatarEffect === 'cyber') {
                pAvatarFx.innerHTML = `<div style="position:absolute; inset: -5px; border: 2px dashed ${fxCol}; border-radius: 40px; animation: f-spin 10s linear infinite;"></div>`;
            } else if(data.avatarEffect === 'shadow') {
                pAvatarFx.innerHTML = `<div style="position:absolute; inset: 10px; border-radius: 50%; background: ${fxCol}; filter: blur(20px); opacity: 0.5;"></div>`;
            }
            
            if(data.avatarEffect) {
                avWrap.classList.add('avatar-glow');
                avWrap.style.color = fxCol;
            }
        });
    </script>
